name: Keep Streamlit Awake
on:
  schedule:
    - cron: '0 */6 * * *' # This runs exactly every 6 hours
  workflow_dispatch:      # Allows you to run it manually

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: curl -I https://stat-sketch.streamlit.app/